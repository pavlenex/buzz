# =============================================================================
# Isolated test-relay backing stack — GUI read-model overhaul harness (Dawn).
#
# A SEPARATE Compose project (`buzz-harness`) so the shared :3000 relay and the
# default `buzz-*` dev stack are never touched. No fixed container_names (they
# collide across projects) and alternate host ports. Mirrors Eva's evaperf-*
# isolation pattern.
#
#   Bring up:  docker compose -p buzz-harness -f docker-compose.harness.yml up -d
#   Ports:     postgres 5471 · redis 6471 · minio 9471/9472
#   Relay (run separately by scripts/start-isolated-test-relay.sh):
#              main 3030 · health 8088 · metrics 9202
# =============================================================================
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: buzz
      POSTGRES_PASSWORD: buzz_dev
      POSTGRES_DB: buzz
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5471:5432"
    volumes:
      - harness-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buzz"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6471:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: buzz_dev
      MINIO_ROOT_PASSWORD: buzz_dev_secret
    ports:
      - "9471:9000"
      - "9472:9001"
    volumes:
      - harness-minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 buzz_dev buzz_dev_secret &&
        mc mb --ignore-existing local/buzz-media &&
        mc anonymous set none local/buzz-media
      "
    restart: "no"

volumes:
  harness-postgres-data:
  harness-minio-data:
